spring:
  application:
    name: HerRide-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/HerRide?options=-c%20timezone=UTC}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 60000

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_JAAS_CONFIG}
      ssl.engine.factory.class: com.herride.backend.config.TrustAllSslEngineFactory
    consumer:
      group-id: HerRide-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  websocket:
    allowed-origins: "*"

resilience4j:
  circuitbreaker:
    instances:
      smsService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      paystackClient:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  retry:
    instances:
      smsService:
        maxAttempts: 3
        waitDuration: 2s
      paystackClient:
        maxAttempts: 3
        waitDuration: 2s

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

  paystack:
    secret-key: ${PAYSTACK_SECRET_KEY:your-paystack-secret-key}
    base-url: ${PAYSTACK_BASE_URL:https://api.paystack.co}

  termii:
    api-key: ${TERMII_API_KEY:your-termii-api-key}
    base-url: ${TERMII_BASE_URL:https://api.ng.termii.com}
    sender-id: ${TERMII_SENDER_ID:HerRide}

  safety:
    check-in-threshold-minutes: 30
    check-in-timeout-minutes: 5
    sharing-token-expiration-hours: 2

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

server:
  port: 8080
